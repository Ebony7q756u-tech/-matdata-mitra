// ─── HELPERS ─────────────────────────────────────────────────────────────────
function findOfflineAnswer(question) {
  const q = question.toLowerCase();
  let best = null, bestScore = 0;
  OFFLINE_QA.forEach(item => {
    let score = 0;
    item.q.forEach(kw => { if (q.includes(kw)) score++; });
    if (score > bestScore) { bestScore = score; best = item; }
  });
  if (best && bestScore > 0) return best.a;
  return "🗳️ I have **pre-loaded answers** on Indian elections! Try asking about:\n- Voter registration, EVM, VVPAT\n- Lok Sabha, Rajya Sabha, Vidhan Sabha\n- Election timeline, MCC, Counting\n- Voter ID, Postal ballot, Symbols\n\n*(API temporarily offline — answers from built-in knowledge base)*";
}

function fmtText(text, keyColor = "#4285F4") {
  return text.split("\n").map((line, i) => {
    const f = line
      .replace(/\*\*(.*?)\*\*/g, `<strong style="color:${keyColor}">$1</strong>`)
      .replace(/^(\d+\.)\s/, '<span style="color:#34A853;font-weight:700">$1</span> ')
      .replace(/^[-•▸]\s?/, `<span style="color:${keyColor}">▸</span> `);
    return React.createElement("div", { key:i, style:{marginBottom:line?"4px":"8px"}, dangerouslySetInnerHTML:{__html:f||"&nbsp;"} });
  });
}

// ─── QUIZ PANEL ───────────────────────────────────────────────────────────────
function QuizPanel({ callGeminiDirect, T, darkMode }) {
  const [difficulty, setDifficulty]     = useState("Medium");
  const [topic, setTopic]               = useState("General");
  const [questions, setQuestions]       = useState([]);
  const [currentQ, setCurrentQ]         = useState(0);
  const [selectedAns, setSelectedAns]   = useState(null);
  const [showExpl, setShowExpl]         = useState(false);
  const [score, setScore]               = useState(0);
  const [answered, setAnswered]         = useState([]);
  const [quizDone, setQuizDone]         = useState(false);
  const [loading, setLoading]           = useState(false);
  const [error, setError]               = useState("");

  const TOPICS = ["General","EVM & Technology","Election Laws","Types of Elections","Voter Rights","Indian History of Elections"];
  const DIFFS  = [{ d:"Easy", c:"#34A853" },{ d:"Medium", c:"#FBBC05" },{ d:"Hard", c:"#EA4335" }];

  const generateQuiz = async () => {
    setLoading(true); setError(""); setQuestions([]); setCurrentQ(0);
    setSelectedAns(null); setShowExpl(false); setScore(0); setAnswered([]); setQuizDone(false);
    const prompt = `Generate exactly 5 ${difficulty.toLowerCase()} multiple choice questions about Indian elections, topic: "${topic}". Return ONLY a raw JSON array. No markdown, no code fences, no extra text before or after. Use this exact format with SHORT explanations (max 12 words each): [{"q":"Question?","options":["A","B","C","D"],"correct":0,"explanation":"Short reason."}]`;
    try {
      const raw = await callGeminiDirect(prompt);
      // Strip markdown fences if present
      let clean = raw.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
      // Extract just the JSON array (from first [ to last ])
      const start = clean.indexOf("[");
      const end   = clean.lastIndexOf("]");
      if (start !== -1 && end !== -1 && end > start) {
        clean = clean.slice(start, end + 1);
      }
      let qs;
      try {
        qs = JSON.parse(clean);
      } catch(parseErr) {
        // JSON is truncated — extract all complete objects manually
        const objRegex = /\{[^{}]*"q"\s*:\s*"[^"]*"[^{}]*"options"\s*:\s*\[[^\]]*\][^{}]*"correct"\s*:\s*\d[^{}]*\}/g;
        const matches = clean.match(objRegex) || [];
        if (matches.length === 0) throw new Error("Could not parse quiz response. Please try again.");
        qs = matches.map(m => { try { return JSON.parse(m); } catch(e2){ return null; } }).filter(Boolean);
        if (qs.length === 0) throw new Error("Could not parse quiz response. Please try again.");
      }
      if (!Array.isArray(qs) || qs.length === 0) throw new Error("Invalid format received.");
      setQuestions(qs);
    } catch(e) {
      setError("⚠️ Could not generate quiz. " + e.message + " Please try again!");
    }
    setLoading(false);
  };

  const handleAnswer = (idx) => {
    if (selectedAns !== null) return;
    setSelectedAns(idx);
    setShowExpl(true);
    const isCorrect = idx === questions[currentQ].correct;
    if (isCorrect) setScore(s=>s+1);
    setAnswered(prev=>[...prev,{selected:idx,correct:questions[currentQ].correct,isCorrect}]);
  };

  const nextQ = () => {
    if (currentQ+1 >= questions.length) { setQuizDone(true); }
    else { setCurrentQ(q=>q+1); setSelectedAns(null); setShowExpl(false); }
  };

  const scoreLabel = () => {
    const p = score/questions.length;
    if (p===1)  return ["🏆","Perfect Score! You're an election expert!","#FBBC05"];
    if (p>=0.8) return ["⭐","Excellent! Great knowledge of Indian elections!","#34A853"];
    if (p>=0.6) return ["👍","Good Job! Keep learning about democracy.","#4285F4"];
    if (p>=0.4) return ["📚","Keep Learning! Democracy rewards the informed.","#FF9933"];
    return ["💪","Practice More! Every vote starts with knowledge.","#EA4335"];
  };

  // Setup screen
  if (questions.length===0 && !loading) return (
    <div style={{ padding:"20px 16px 100px", maxWidth:700, margin:"0 auto", animation:"slideUp 0.3s ease" }}>
      <div style={{ marginBottom:18 }}>
        <div style={{ fontSize:18, fontWeight:"bold", color:"#4285F4", marginBottom:4, letterSpacing:1 }}>🧠 Election Knowledge Quiz</div>
        <div style={{ fontSize:12, color:T.subText }}>Test your knowledge — 5 AI-generated questions per round</div>
      </div>

      {error && <div style={{ padding:"12px 16px", borderRadius:12, background:"rgba(234,67,53,0.1)", border:"1px solid rgba(234,67,53,0.3)", color:"#EA4335", fontSize:12, marginBottom:14 }}>{error}</div>}

      <div style={{ marginBottom:16 }}>
        <div style={{ fontSize:11, color:T.dimText, letterSpacing:1, marginBottom:8 }}>TOPIC</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
          {TOPICS.map(t => (
            <button key={t} onClick={()=>setTopic(t)}
              style={{ padding:"7px 13px", borderRadius:16, fontFamily:"Georgia,serif",
                border:"1px solid "+(topic===t?"#4285F4":"rgba(255,255,255,0.15)"),
                background:topic===t?"rgba(66,133,244,0.18)":"rgba(255,255,255,0.04)",
                color:topic===t?"#4285F4":T.text, fontSize:11, cursor:"pointer", transition:"all 0.2s" }}>
              {t}
            </button>
          ))}
        </div>
      </div>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:11, color:T.dimText, letterSpacing:1, marginBottom:8 }}>DIFFICULTY</div>
        <div style={{ display:"flex", gap:8 }}>
          {DIFFS.map(({d,c}) => (
            <button key={d} onClick={()=>setDifficulty(d)}
              style={{ flex:1, padding:"11px", borderRadius:12, fontFamily:"Georgia,serif",
                border:"2px solid "+(difficulty===d?c:"rgba(255,255,255,0.1)"),
                background:difficulty===d?c+"22":"rgba(255,255,255,0.04)",
                color:difficulty===d?c:T.subText, fontWeight:"bold", fontSize:13,
                cursor:"pointer", transition:"all 0.2s" }}>{d}</button>
          ))}
        </div>
      </div>

      <button onClick={generateQuiz}
        style={{ width:"100%", padding:"15px", borderRadius:14, border:"none",
          background:"linear-gradient(135deg,#4285F4,#34A853)", color:"white",
          fontSize:15, fontWeight:"bold", cursor:"pointer", fontFamily:"Georgia,serif", letterSpacing:1,
          boxShadow:"0 8px 28px rgba(66,133,244,0.4)" }}>
        🧠 Start Quiz — 5 Questions
      </button>

      <div style={{ marginTop:18, display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10 }}>
        {[["5 Qs","Per round"],["✨ AI","Generated"],["🇮🇳","All topics"]].map(([v,l],i)=>(
          <div key={i} style={{ textAlign:"center", padding:"12px 8px", borderRadius:12,
            background:darkMode?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.7)",
            border:"1px solid rgba(66,133,244,0.15)" }}>
            <div style={{ fontSize:18, fontWeight:"bold", color:"#4285F4", marginBottom:2 }}>{v}</div>
            <div style={{ fontSize:10, color:T.subText, letterSpacing:1 }}>{l}</div>
          </div>
        ))}
      </div>
    </div>
  );

  if (loading) return (
    <div style={{ padding:"20px", textAlign:"center", maxWidth:700, margin:"0 auto", paddingTop:80 }}>
      <div style={{ width:60, height:60, borderRadius:"50%", background:"linear-gradient(135deg,#4285F4,#34A853,#FBBC05)",
        animation:"gemSpin 1s linear infinite", display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:28, marginBottom:18 }}>🧠</div>
      <div style={{ color:T.subText, fontSize:12, letterSpacing:2, marginBottom:12 }}>GEMINI IS CRAFTING YOUR QUIZ...</div>
      <div style={{ display:"flex", gap:6, justifyContent:"center" }}>
        {[0,1,2].map(i=><div key={i} style={{width:9,height:9,borderRadius:"50%",background:"#4285F4",animation:`bounce 1.2s ${i*0.2}s infinite`}}/>)}
      </div>
    </div>
  );

  if (quizDone) {
    const [emoji,msg,col] = scoreLabel();
    return (
      <div style={{ padding:"20px 16px 100px", maxWidth:700, margin:"0 auto", animation:"slideUp 0.4s ease" }}>
        <div style={{ textAlign:"center", padding:"28px 20px", borderRadius:20,
          background:darkMode?"rgba(255,255,255,0.05)":"rgba(255,255,255,0.85)",
          border:"1px solid rgba(66,133,244,0.3)", marginBottom:18, boxShadow:"0 8px 32px rgba(0,0,0,0.15)" }}>
          <div style={{ fontSize:54, marginBottom:10 }}>{emoji}</div>
          <div style={{ fontSize:30, fontWeight:"bold", color:col, marginBottom:4 }}>{score} / {questions.length}</div>
          <div style={{ fontSize:15, color:T.text, marginBottom:4 }}>{msg}</div>
          <div style={{ fontSize:11, color:T.dimText, letterSpacing:1 }}>Topic: {topic} • Difficulty: {difficulty}</div>
        </div>
        <div style={{ fontSize:13, color:T.text, fontWeight:"bold", marginBottom:12 }}>📋 Answer Review:</div>
        {questions.map((q,i) => (
          <div key={i} style={{ padding:"12px 16px", borderRadius:12, marginBottom:8,
            background:answered[i]?.isCorrect?"rgba(52,168,83,0.08)":"rgba(234,67,53,0.08)",
            border:"1px solid "+(answered[i]?.isCorrect?"rgba(52,168,83,0.3)":"rgba(234,67,53,0.3)") }}>
            <div style={{ fontSize:12, fontWeight:"bold", color:answered[i]?.isCorrect?"#34A853":"#EA4335", marginBottom:3 }}>
              {answered[i]?.isCorrect?"✅":"❌"} Q{i+1}: {q.q}
            </div>
            <div style={{ fontSize:11, color:T.subText }}>
              Your answer: <span style={{color:answered[i]?.isCorrect?"#34A853":"#EA4335"}}>{q.options[answered[i]?.selected]}</span>
              {!answered[i]?.isCorrect && <> • Correct: <span style={{color:"#34A853"}}>{q.options[q.correct]}</span></>}
            </div>
          </div>
        ))}
        <button onClick={()=>{setQuestions([]);setError("");}}
          style={{ width:"100%", padding:"14px", borderRadius:14, border:"none",
            background:"linear-gradient(135deg,#4285F4,#34A853)", color:"white", fontSize:14,
            fontWeight:"bold", cursor:"pointer", fontFamily:"Georgia,serif", marginTop:6 }}>
          🔄 Play Again
        </button>
      </div>
    );

  // Active question
  const q = questions[currentQ];
  return (
    <div style={{ padding:"20px 16px 100px", maxWidth:700, margin:"0 auto" }}>
      <div style={{ marginBottom:14 }}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
          <span style={{ fontSize:12, color:T.subText }}>Question {currentQ+1} of {questions.length}</span>
          <span style={{ fontSize:12, color:"#34A853", fontWeight:"bold" }}>Score: {score}</span>
        </div>
        <div style={{ height:6, borderRadius:3, background:"rgba(255,255,255,0.1)", overflow:"hidden" }}>
          <div style={{ height:"100%", width:(currentQ/questions.length*100)+"%",
            background:"linear-gradient(90deg,#4285F4,#34A853)", borderRadius:3, transition:"width 0.4s ease" }}/>
        </div>
      </div>

      <div style={{ padding:"20px", borderRadius:16, marginBottom:14,
        background:darkMode?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.88)",
        border:"1px solid rgba(66,133,244,0.25)", boxShadow:"0 4px 20px rgba(0,0,0,0.13)" }}>
        <div style={{ fontSize:10, color:"#4285F4", letterSpacing:2, marginBottom:8 }}>✨ {topic.toUpperCase()} • {difficulty.toUpperCase()}</div>
        <div style={{ fontSize:15, fontWeight:"bold", color:T.text, lineHeight:1.65 }}>{q.q}</div>
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:9, marginBottom:14 }}>

          let bg = darkMode?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.7)";
          let border = "1px solid rgba(255,255,255,0.1)";
          let col = T.text;
          let anim = "none";
          if (selectedAns!==null) {
            if (i===q.correct)                  { bg="rgba(52,168,83,0.15)"; border="2px solid #34A853"; col="#34A853"; if(i===q.correct)anim="correctFlash 0.6s ease"; }
            else if (i===selectedAns)           { bg="rgba(234,67,53,0.15)"; border="2px solid #EA4335"; col="#EA4335"; anim="wrongShake 0.4s ease"; }
          }
          return (
            <button key={i} className="option-btn" onClick={()=>handleAnswer(i)}

              {selectedAns===i && i!==q.correct && <span>❌</span>}
            </button>
          );

      {showExpl && (
        <div style={{ animation:"slideUp 0.3s ease" }}>

    </div>
  );

function FinderPanel({ callGeminiDirect, T, darkMode }) {

  const [result, setResult]   = useState("");

function ElectionAssistant() {
  const [messages, setMessages]       = useState([{
    role:"assistant",
    content:"🙏 **Jai Hind!** I'm **Matdata Mitra** — your personal Indian Election Guide, powered by **Google Gemini AI**!\n\nI can help you understand:\n- 🗳️ How to vote & register\n- 📅 Election timelines & process\n- 🏛️ Types of elections\n- ⚙️ EVMs, counting & results\n- 📜 Rules, laws & your rights\n\nWhat would you like to know about India's elections? 🇮🇳"
  }]);
  const [input, setInput]             = useState("");
  const [loading, setLoading]         = useState(false);
  const [apiKey, setApiKey]           = useState("");
  const [keySubmitted, setKeySubmitted]= useState(false);
  const [verifying, setVerifying]      = useState(false);
  const [verifyError, setVerifyError]  = useState("");
  const [particles, setParticles]     = useState([]);
  const [apiCallsUsed, setApiCallsUsed]= useState(0);
  const [cooldown, setCooldown]       = useState(0);
  const [offlineMode, setOfflineMode] = useState(false);
  const [barOpen, setBarOpen]         = useState(true);
  const [darkMode, setDarkMode]       = useState(true);
  const [activeModule, setActiveModule]= useState(null);
  const [moduleLoading, setModuleLoading]= useState(false);
  const [moduleResult, setModuleResult]= useState("");
  const [accessInput, setAccessInput] = useState("");
  const [activeTab, setActiveTab]     = useState("chat");
  const [lang, setLang]               = useState("en");
  const [listening, setListening]     = useState(false);
  const [copiedIdx, setCopiedIdx]     = useState(null);
  const messagesEndRef                = useRef(null);
  const cooldownRef                   = useRef(null);
  const recognitionRef                = useRef(null);

  useEffect(() => {
    const pts = Array.from({length:22},(_,i)=>({
      id:i, x:Math.random()*100, y:Math.random()*100,
      size:Math.random()*3+1,
      color:["#FF9933","#138808","#FFFFFF","#000080","#4285F4"][Math.floor(Math.random()*5)],
      duration:Math.random()*8+4, delay:Math.random()*4,
    }));
    setParticles(pts);
  }, []);

  useEffect(() => {
    messagesEndRef.current && messagesEndRef.current.scrollIntoView({behavior:"smooth"});
  }, [messages, loading]);

  useEffect(() => {
    if (cooldown > 0) {
      cooldownRef.current = setInterval(()=>{
        setCooldown(prev => {
          if (prev<=1){ clearInterval(cooldownRef.current); setOfflineMode(false); return 0; }
          return prev-1;
        });
      }, 1000);
    }
    return ()=>clearInterval(cooldownRef.current);
  }, [cooldown>0 && offlineMode]);

  // ── Gemini chat call ──
  const callGemini = async (newMessages, userText) => {
    const history = newMessages.slice(1,-1).slice(-6).map(m=>({
      role:m.role==="assistant"?"model":"user",
      parts:[{text:m.content}]
    }));
    const body = {
      system_instruction:{parts:[{text:SYSTEM_PROMPT}]},
      contents:[...history,{role:"user",parts:[{text:userText}]}],
      generationConfig:{temperature:0.7,maxOutputTokens:2048}
    };
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key="+apiKey,
      {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message||"Gemini API error");
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!reply) throw new Error("Empty response from Gemini");
    return reply;
  };

  // ── Gemini direct call (for feature panels) ──
  const callGeminiDirect = async (prompt) => {
    const body = {
      contents:[{role:"user",parts:[{text:prompt}]}],
      generationConfig:{temperature:0.7,maxOutputTokens:2048}
    };
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key="+apiKey,
      {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message||"Gemini API error");
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error("Empty response");
    return text;
  };

  const sendMessage = async (text) => {
    const userText = text||input.trim();
    if (!userText||loading) return;
    setInput("");
    const newMessages = [...messages,{role:"user",content:userText}];
    setMessages(newMessages);
    setLoading(true);

    if (offlineMode || apiCallsUsed>=DAILY_LIMIT) {
      setTimeout(()=>{
        const ans = findOfflineAnswer(userText);
        setMessages(prev=>[...prev,{role:"assistant",content:"📚 *(Offline Knowledge Base"+(cooldown>0?" — API back in "+cooldown+"s":" — Daily limit reached")+")*\n\n"+ans}]);
        setLoading(false);
      },600);
      return;
    }

    try {
      try {
        const reply = await callGemini(newMessages, userText);
        setApiCallsUsed(p=>p+1);
        setMessages(prev=>[...prev,{role:"assistant",content:reply}]);
      } catch(geminiErr) {
        // Gemini failed → offline Q&A fallback
        setOfflineMode(true); setCooldown(COOLDOWN_SECONDS);
        const ans = findOfflineAnswer(userText);
        setMessages(prev=>[...prev,{role:"assistant",content:"📚 *(Gemini offline — built-in Knowledge Base. Retrying in "+COOLDOWN_SECONDS+"s)*\n\n"+ans}]);
      }
    } catch(e) {
      setMessages(prev=>[...prev,{role:"assistant",content:"⚠️ Unexpected error: "+e.message}]);
    }
    setLoading(false);
  };

  const handleKey = (e) => {
    if (e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
  };

  const formatMessage = (text) =>
    text.split("\n").map((line,i) => {
      const f = line
        .replace(/\*\*(.*?)\*\*/g,'<strong style="color:#FF9933">$1</strong>')
        .replace(/^(\d+\.)\s/,'<span style="color:#34A853;font-weight:700">$1</span> ')
        .replace(/^[-•]\s/,'<span style="color:#FF9933">▸</span> ');
      return React.createElement("div",{key:i,style:{marginBottom:line?"4px":"8px"},dangerouslySetInnerHTML:{__html:f||"&nbsp;"}});
    });

                    background:"linear-gradient(135deg,#4285F4,#34A853,#FBBC05,#EA4335)",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0 }}>✨</div>
                  <div style={{ padding:"13px 17px",borderRadius:"4px 20px 20px 20px",
                    background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",
                    backdropFilter:"blur(12px)" }}>
                    <TypingDots/>
                  </div>
                </div>
              )}
              <div ref={messagesEndRef}/>
            </div>

            {/* Input */}
            <div style={{ position:"sticky",bottom:0,zIndex:20,
              padding:"10px 14px 14px",background:T.inputBg,
              backdropFilter:"blur(20px)",borderTop:"1px solid rgba(66,133,244,0.15)",
              transition:"background 0.4s" }}>
              <div style={{ maxWidth:720,margin:"0 auto",display:"flex",gap:9,alignItems:"flex-end" }}>
                {/* Voice input button */}
                <button onClick={startListening} disabled={loading} title="Voice Input (Mic)"
                  style={{ width:44,height:44,borderRadius:"50%",flexShrink:0,border:"none",
                    background:listening?"rgba(234,67,53,0.25)":"rgba(234,67,53,0.1)",
                    color:listening?"#EA4335":"rgba(234,67,53,0.65)",fontSize:19,cursor:"pointer",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    border:"2px solid "+(listening?"#EA4335":"rgba(234,67,53,0.3)"),
                    animation:listening?"micPulse 1.2s infinite":"none",
                    transition:"all 0.25s" }}>🎤</button>
                <textarea value={input}
                  onChange={e=>setInput(e.target.value)} onKeyDown={handleKey}
                  placeholder={L.placeholder}
                  rows={1} disabled={loading}
                  style={{ flex:1,padding:"12px 15px",borderRadius:14,
                    background:T.inputField,
                    border:"1px solid rgba(66,133,244,0.25)",
                    color:T.text,fontSize:13,fontFamily:"Georgia,serif",
                    resize:"none",transition:"all 0.3s",boxSizing:"border-box",lineHeight:1.5,
                    outline:"none" }}
                  onInput={e=>{ e.target.style.height="auto"; e.target.style.height=Math.min(e.target.scrollHeight,120)+"px"; }}
                />
                <button className="send-btn" onClick={()=>sendMessage()} disabled={loading||!input.trim()}
                  style={{ width:46,height:46,borderRadius:"50%",border:"none",
                    background:input.trim()&&!loading?"linear-gradient(135deg,#4285F4,#34A853)":"rgba(255,255,255,0.1)",
                    color:"white",fontSize:19,cursor:input.trim()&&!loading?"pointer":"default",
                    transition:"all 0.3s",display:"flex",alignItems:"center",justifyContent:"center",
                    boxShadow:input.trim()?"0 0 15px rgba(66,133,244,0.4)":"none",flexShrink:0 }}>
                  {loading?"⏳":"🚀"}
                </button>
              </div>
              <div style={{ maxWidth:720,margin:"5px auto 0",textAlign:"center",
                fontSize:9,color:T.dimText,letterSpacing:1 }}>
                {L.footer}
              </div>
            </div>
          </>
        )}

        {/* OTHER TABS */}
        {activeTab==="states"    && <StatesPanel    callGeminiDirect={callGeminiDirect} T={T} darkMode={darkMode}/>}
        {activeTab==="quiz"      && <QuizPanel      callGeminiDirect={callGeminiDirect} T={T} darkMode={darkMode}/>}
        {activeTab==="finder"    && <FinderPanel    callGeminiDirect={callGeminiDirect} T={T} darkMode={darkMode}/>}
        {activeTab==="calendar"  && <CalendarPanel  T={T} darkMode={darkMode}/>}
        {activeTab==="checklist" && <ChecklistPanel T={T} darkMode={darkMode}/>}
      </div>

      {/* ── STATUS BAR (chat tab only) ── */}
      {activeTab==="chat" && (
        <div style={{ position:"fixed",bottom:90,right:10,zIndex:999,
          width:barOpen?216:42,transition:"width 0.35s cubic-bezier(.4,0,.2,1)",overflow:"hidden" }}>
          <div style={{ background:T.statusBg,backdropFilter:"blur(18px)",
            border:"1px solid "+(offlineMode?"rgba(234,67,53,0.5)":"rgba(66,133,244,0.5)"),
            borderRadius:14,boxShadow:"0 8px 32px rgba(0,0,0,0.45)",overflow:"hidden" }}>
            <div onClick={()=>setBarOpen(o=>!o)}
              style={{ display:"flex",alignItems:"center",justifyContent:barOpen?"space-between":"center",
                padding:"8px 11px",cursor:"pointer",
                borderBottom:barOpen?"1px solid rgba(255,255,255,0.07)":"none" }}>
              <span style={{ fontSize:15 }}>{offlineMode?"📚":"✨"}</span>
              {barOpen && <span style={{ fontSize:9,color:"rgba(255,255,255,0.45)",letterSpacing:1 }}>API STATUS</span>}
              {barOpen && <span style={{ fontSize:11,color:"rgba(255,255,255,0.35)" }}>▼</span>}
            </div>
            {barOpen && (
              <div style={{ padding:"9px 11px 11px",fontFamily:"Georgia,serif" }}>
                <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7 }}>
                  <span style={{ fontSize:9,color:"rgba(255,255,255,0.4)",letterSpacing:1 }}>ENGINE</span>
                  <span style={{ fontSize:9,fontWeight:"bold",letterSpacing:1,padding:"1px 7px",borderRadius:7,
                    background:offlineMode?"rgba(234,67,53,0.2)":"rgba(66,133,244,0.2)",
                    color:offlineMode?"#EA4335":"#4285F4",
                    border:"1px solid "+(offlineMode?"rgba(234,67,53,0.4)":"rgba(66,133,244,0.4)") }}>
                    {offlineMode?"📚 OFFLINE":"✨ GEMINI"}
                  </span>
                </div>
                <div style={{ marginBottom:6 }}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:3 }}>
                    <span style={{ fontSize:9,color:"rgba(255,255,255,0.4)",letterSpacing:1 }}>API CALLS</span>
                    <span style={{ fontSize:9,color:"rgba(255,255,255,0.8)",fontWeight:"bold" }}>{apiCallsUsed} / {DAILY_LIMIT}</span>
                  </div>
                  <div style={{ height:4,borderRadius:2,background:"rgba(255,255,255,0.08)",overflow:"hidden" }}>
                    <div style={{ height:"100%",borderRadius:2,
                      width:(apiCallsUsed/DAILY_LIMIT*100)+"%",
                      background:apiCallsUsed>=DAILY_LIMIT?"#EA4335":apiCallsUsed>35?"#FBBC05":"linear-gradient(90deg,#4285F4,#34A853)",
                      transition:"width 0.5s ease" }}/>
                  </div>
                </div>
                {cooldown>0 && (
                  <div style={{ background:"rgba(234,67,53,0.1)",border:"1px solid rgba(234,67,53,0.3)",
                    borderRadius:7,padding:"5px 8px",marginBottom:5 }}>
                    <div style={{ fontSize:9,color:"#EA4335",letterSpacing:1,marginBottom:2 }}>⏱ COOLDOWN: {cooldown}s</div>
                    <div style={{ height:3,borderRadius:1.5,background:"rgba(255,255,255,0.08)",overflow:"hidden" }}>
                      <div style={{ height:"100%",borderRadius:1.5,
                        width:((COOLDOWN_SECONDS-cooldown)/COOLDOWN_SECONDS*100)+"%",
                        background:"#EA4335",transition:"width 1s linear" }}/>
                    </div>
                  </div>
                )}
                <div style={{ display:"flex",alignItems:"center",gap:4 }}>
                  <div style={{ width:5,height:5,borderRadius:"50%",
                    background:offlineMode?"#EA4335":"#34A853",animation:"pulse 2s infinite" }}/>
                  <span style={{ fontSize:8,color:T.subText,letterSpacing:1 }}>
                    {offlineMode?"OFFLINE — KB ACTIVE":apiCallsUsed>=DAILY_LIMIT?"LIMIT REACHED":"ONLINE & READY"}
                  </span>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── FABs (chat tab only) ── */}
      {activeTab==="chat" && (() => {
        return (
          <>
            <div style={{ position:"fixed",left:10,bottom:108,zIndex:998,display:"flex",flexDirection:"column",gap:9 }}>
              {FABS.map(f=>(
                <div key={f.id} className="fab-btn" style={{ position:"relative",display:"flex",alignItems:"center" }}>
                  <div className="fab-tip" style={{
                    position:"absolute",left:52,whiteSpace:"nowrap",
                    background:"rgba(10,10,26,0.92)",backdropFilter:"blur(10px)",
                    border:"1px solid "+f.color+"55",borderRadius:9,
                    padding:"4px 11px",fontSize:11,color:"rgba(255,255,255,0.85)",
                    opacity:0,transform:"translateX(-6px)",
                    transition:"opacity 0.2s,transform 0.2s",pointerEvents:"none",
                    boxShadow:"0 4px 14px rgba(0,0,0,0.35)",letterSpacing:0.5,fontFamily:"Georgia,serif" }}>{f.label}</div>
                  <button onClick={()=>activeModule===f.id?setActiveModule(null):openModule(f)}
                    style={{ width:44,height:44,borderRadius:"50%",
                      border:"2px solid "+f.color+"88",
                      background:activeModule===f.id?f.color:"rgba(10,10,26,0.85)",
                      backdropFilter:"blur(12px)",color:"white",fontSize:19,cursor:"pointer",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      boxShadow:"0 0 14px "+f.color+"44,0 4px 12px rgba(0,0,0,0.4)",
                      transition:"all 0.25s",
                      animation:activeModule===f.id?"pulse 1.5s infinite":"none" }}>{f.icon}</button>
                </div>
              ))}
            </div>

            {/* Module panel */}
            {activeModule && fab && (
              <div className="mod-panel" style={{
                position:"fixed",left:0,right:0,bottom:0,zIndex:997,maxHeight:"72vh",
                background:darkMode?"rgba(8,10,24,0.97)":"rgba(245,248,255,0.97)",
                backdropFilter:"blur(24px)",borderTop:"2px solid "+fab.color+"88",
                borderRadius:"22px 22px 0 0",display:"flex",flexDirection:"column",
                boxShadow:"0 -8px 40px rgba(0,0,0,0.5)",fontFamily:"Georgia,serif" }}>
                <div style={{ display:"flex",alignItems:"center",gap:10,padding:"13px 18px",
                  borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0 }}>
                  <div style={{ width:36,height:36,borderRadius:"50%",
                    background:"linear-gradient(135deg,"+fab.color+","+fab.color+"88)",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,
                    boxShadow:"0 0 14px "+fab.color+"55",animation:"gemSpin 8s linear infinite" }}>{fab.icon}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14,fontWeight:"bold",color:fab.color,letterSpacing:1 }}>{fab.label}</div>
                    <div style={{ fontSize:9,color:T.subText,letterSpacing:2 }}>✨ POWERED BY GOOGLE GEMINI AI</div>
                  </div>
                  <button onClick={()=>setActiveModule(null)}
                    style={{ width:30,height:30,borderRadius:"50%",border:"1px solid rgba(255,255,255,0.15)",
                      background:"rgba(255,255,255,0.06)",color:T.text,fontSize:15,cursor:"pointer",
                      display:"flex",alignItems:"center",justifyContent:"center" }}>✕</button>
                </div>

                {activeModule==="access" && !moduleResult && (
                  <div style={{ padding:"16px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0 }}>
                    <div style={{ fontSize:13,color:T.text,marginBottom:10,lineHeight:1.6 }}>
                      ♿ Enter your <strong style={{color:"#FBBC05"}}>disability/condition</strong> for a personalised ECI accessibility report:
                    </div>
                    <div style={{ display:"flex",gap:9 }}>
                      <input value={accessInput} onChange={e=>setAccessInput(e.target.value)}
                        onKeyDown={e=>e.key==="Enter"&&runAccessScan()}
                        placeholder="e.g. Wheelchair user, Visual impairment, Hearing loss..."
                        style={{ flex:1,padding:"10px 13px",borderRadius:11,
                          background:darkMode?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.85)",
                          border:"1px solid rgba(251,188,5,0.4)",color:T.text,fontSize:12,fontFamily:"Georgia,serif" }}/>
                      <button onClick={runAccessScan} disabled={!accessInput.trim()||moduleLoading}
                        style={{ padding:"10px 18px",borderRadius:11,border:"none",
                          background:accessInput.trim()?"linear-gradient(135deg,#FBBC05,#FF9933)":"rgba(255,255,255,0.1)",
                          color:"white",fontWeight:"bold",cursor:accessInput.trim()?"pointer":"default",
                          fontSize:12,fontFamily:"Georgia,serif" }}>
                        {moduleLoading?"⏳":"🔍 Scan"}
                      </button>
                    </div>
                  </div>
                )}

                {activeModule==="access" && moduleResult && (
                  <div style={{ padding:"8px 18px",flexShrink:0,borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                    <button onClick={()=>{setModuleResult("");setAccessInput("");}}
                      style={{ padding:"5px 14px",borderRadius:9,border:"1px solid rgba(251,188,5,0.4)",
                        background:"rgba(251,188,5,0.1)",color:"#FBBC05",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif" }}>
                      ← New Scan
                    </button>
                  </div>
                )}

                <div style={{ flex:1,overflowY:"auto",padding:"14px 18px" }}>
                  {moduleLoading && (
                    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"36px 0",gap:14 }}>
                      <div style={{ width:46,height:46,borderRadius:"50%",
                        background:"linear-gradient(135deg,#4285F4,#34A853,#FBBC05,#EA4335)",
                        animation:"gemSpin 1s linear infinite",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20 }}>✨</div>
                      <div style={{ color:T.subText,fontSize:11,letterSpacing:2 }}>GEMINI IS THINKING...</div>
                      <div style={{ display:"flex",gap:5 }}>
                        {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#4285F4",animation:`bounce 1.2s ${i*0.2}s infinite`}}/>)}
                      </div>
                    </div>
                  )}
                  {!moduleLoading && moduleResult && (
                    <div style={{ fontSize:13,color:T.text,lineHeight:1.75 }}>
                      {renderModuleResult(moduleResult)}
                    </div>
                  )}
                  {!moduleLoading && !moduleResult && activeModule!=="access" && (
                    <div style={{ textAlign:"center",color:T.subText,padding:"28px 0",fontSize:13 }}>Tap the button again to reload.</div>
                  )}
                  {!moduleLoading && !moduleResult && activeModule==="access" && (
                    <div style={{ textAlign:"center",color:T.subText,padding:"28px 0",fontSize:13 }}>
                      Enter your condition above and tap <strong style={{color:"#FBBC05"}}>Scan</strong>.
                    </div>
                  )}
                </div>
                <div style={{ height:3,background:"linear-gradient(90deg,#FF9933 33%,#fff 33% 66%,#138808 66%)",flexShrink:0 }}/>
              </div>
            )}
          </>
        );
      })()}

      {/* Bottom tricolor */}
      <div style={{ height:3,background:"linear-gradient(90deg,#138808 33%,#FFFFFF 33% 66%,#FF9933 66%)",position:"relative",zIndex:10,flexShrink:0 }}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ElectionAssistant/>);
</script>
</body>
</html>
